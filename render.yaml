# render.yaml — Render Blueprint
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: credit-risk-ai
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "cd webapp && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHON_VERSION
        value: "3.12.0"
