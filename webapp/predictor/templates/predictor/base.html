<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI-powered credit risk assessment using advanced ML models">
    <title>Credit Risk AI | Loan Default Prediction</title>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'predictor/css/style.css' %}?v=2">
</head>

<body>

    <!-- Background Gradient -->
    <div class="bg-gradient"></div>

    <!-- Navigation -->
    <nav class="navbar glass">
        <div class="container nav-container">
            <a href="{% url 'predictor:predict' %}" class="logo">
                <i class="fa-solid fa-shield-halved"></i> Credit Risk AI
            </a>
            <div class="nav-links">
                <a href="{% url 'predictor:predict' %}"
                    class="nav-link {% if request.resolver_match.url_name == 'predict' %}active{% endif %}">
                    <i class="fa-solid fa-calculator"></i> Predict
                </a>
                <a href="{% url 'predictor:dashboard' %}"
                    class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
                    <i class="fa-solid fa-chart-line"></i> Dashboard
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Credit Risk AI &middot; Powered by Logistic Regression & SHAP Explainability</p>
        </div>
    </footer>

    <!-- Custom JS -->
    <script src="{% static 'predictor/js/main.js' %}?v=2"></script>
</body>

</html>
